services:
  - type: web
    name: smart-tags-predictor
    env: python
    region: ohio
    plan: free
    branch: main

    # Extract the committed model zip into ml_raw/ (gitignored dir) then install deps.
    # FDS_PROJ(MAIN).zip contains FDS_PROJ/fds_model_1.keras and Hotel_reservations.csv
    # which model_loader.py expects at ml_raw/FDS_PROJ/*.
    buildCommand: unzip -o "FDS_PROJ(MAIN).zip" -d ml_raw && pip install -r requirements.txt

    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
