services:
  - type: web
    name: smart-tags-predictor
    env: python
    region: ohio
    plan: free
    branch: main

    # Extract the committed model zip into ml_raw/ (gitignored dir), install deps,
    # then download TextBlob's lite NLTK corpora (punkt tokenizer).
    # PatternAnalyzer (.sentiment.polarity) is pattern-based and does not need
    # NLTK corpora itself, but the lite download prevents missing-resource errors
    # if any other TextBlob feature (tokenisation, tagging) is called at runtime.
    buildCommand: unzip -o "FDS_PROJ(MAIN).zip" -d ml_raw && pip install -r requirements.txt && python -m textblob.download_corpora lite

    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
